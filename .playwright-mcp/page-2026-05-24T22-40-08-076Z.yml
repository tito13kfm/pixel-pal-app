    - generic [ref=e3838]:
      - paragraph [ref=e3839]:
        - strong [ref=e3840]: "▸ TIP:"
        - text: Click any swatch to copy its hex code.
      - paragraph [ref=e3841]:
        - strong [ref=e3842]: "▸ DICE:"
        - text: Rolls a random color (Single Color) or a random description (AI Assist). Free, no API call. Click again to re-roll.
      - paragraph [ref=e3843]:
        - strong [ref=e3844]: "▸ SURPRISE ME:"
        - text: The AI invents a subject AND generates its palette in one shot. Uses one API call.
      - paragraph [ref=e3845]:
        - strong [ref=e3846]: "▸ IMPORT:"
        - text: Drop a Piskel C file to add custom preview sprites.
      - paragraph [ref=e3847]:
        - strong [ref=e3848]: "▸ COPY:"
        - text: Click the cyan icon on custom sprites to copy their source code.
      - paragraph [ref=e3849]:
        - strong [ref=e3850]: "▸ EDIT:"
        - text: Click the slider icon on any ramp to adjust its base color with HSV sliders or a color picker.
      - paragraph [ref=e3851]:
        - strong [ref=e3852]: "▸ PIN:"
        - text: "Click the pushpin on any shade (except the base) to lock that shade to a custom hex. The base shade is always your chosen base color, so pinning it would do nothing. Pins are per-style: a pin on a Balanced swatch only affects the Balanced ramp. Click a pinned pin again to unpin."
      - paragraph [ref=e3853]:
        - strong [ref=e3854]: "▸ HIDE SHADE:"
        - text: Right-click any swatch to hide that shade across all 3 styles for that base. Hidden shades are excluded from .gpl / .txt exports and the visualization. Use the Restore button on the ramp card to bring them back. The last visible shade in a ramp cannot be hidden.
      - paragraph [ref=e3855]:
        - strong [ref=e3856]: "▸ CONTRAST:"
        - text: "Hover any ramp swatch to see WCAG AA contrast ratios against its neighbors. Click the WCAG Check button to enter pick-two mode: click an anchor, then any other ramp swatch to see the ratio, AA tier, and a live foreground/background preview."
      - paragraph [ref=e3857]:
        - strong [ref=e3858]: "▸ HARMONIZE:"
        - text: Rotates every unlocked non-anchor ramp to a color-theory position (complement, analogous, triadic, etc.) relative to the anchor ramp. Anchor is the ramp set in the Derive From selector. Lock any ramp to hold its hue in place during the rotation.
      - paragraph [ref=e3859]:
        - strong [ref=e3860]: "▸ LOCK RAMP:"
        - text: Click the lock icon on any ramp card to freeze it. Generate, Shuffle, and Harmonize all skip locked ramps. Pins and hidden shades are unaffected. Useful for protecting a finished ramp while iterating on the rest of the palette.
      - paragraph [ref=e3861]:
        - strong [ref=e3862]: "▸ SIDE-BY-SIDE:"
        - text: Compare two palettes (the working palette or any saved palette) in mosaic, lightness bar, and chromatic plot views. Useful for comparing a candidate palette against an established one. Distinct from WCAG Check in the export bar, which checks two individual swatches for WCAG contrast.
      - paragraph [ref=e3863]:
        - strong [ref=e3864]: "▸ HARMONY:"
        - text: With multiple ramps, use the "Derive From" selector at the top of the Harmony Colors section to choose which ramp drives the harmony palette.
      - paragraph [ref=e3865]:
        - strong [ref=e3866]: "▸ SAVE:"
        - text: Name and save palettes locally. They persist across browser sessions on this device. The Saved Palettes section also has a compact loader for the classic "inspired by" presets (DB16, PICO-8, Game Boy, etc).
      - paragraph [ref=e3867]:
        - strong [ref=e3868]: "▸ LOCK:"
        - text: "Click a hardware button (NES, Game Boy, CGA 16, EGA 64, C64) to enter a persistent lock mode. Every generated shade and harmony color snaps to the nearest hardware-legal hex. Click the active button again or \"Unlock\" to return to free generation. Non-destructive: your base colors and pins are preserved."
      - paragraph [ref=e3869]:
        - strong [ref=e3870]: "▸ HISTORY:"
        - text: The History section above the export bar lists your recent actions. Click any entry to jump to that state, or use Cmd/Ctrl+Z and Cmd/Ctrl+Y for sequential undo/redo. Last 20 actions are remembered per browser session; a page reload starts fresh.
      - paragraph [ref=e3871]:
        - strong [ref=e3872]: "▸ .GPL:"
        - text: Standard GIMP palette format, importable into Piskel, Aseprite, GIMP, Krita, and most pixel art tools.