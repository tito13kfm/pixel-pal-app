name: Tag release

# Creates an annotated release tag via the GitHub API, optionally chaining
# into the Release + Deploy web workflows. Exists because remote agent
# sessions (Claude Code on the web) can push BRANCHES but not TAGS (the
# session git proxy rejects tag pushes), and their GitHub App token cannot
# dispatch workflows either. That combination is how v0.23.0/v0.24.0 ended up
# version-bumped on master but never tagged or released.
#
# Trigger from an agent session by pushing a short-lived signal branch whose
# NAME carries the request (the branch itself must contain this workflow
# file, so point it at current master):
#
#   release-tag/vX.Y.Z            create annotated tag vX.Y.Z at the branch
#                                 head; no build. Use with an explicit SHA
#                                 segment for retro-tagging an older commit:
#   release-tag/vX.Y.Z/<40-char>  create the tag at that commit instead.
#   release-run/vX.Y.Z            create the tag at the branch head, then
#                                 dispatch Release + Deploy web AT the tag.
#                                 This is the full release path.
#
# The signal branch is deleted at the end of the run. Humans can do the same
# from the Actions tab via Run workflow (inputs below).
#
# Chaining works because workflow_dispatch is exempt from GitHub's
# GITHUB_TOKEN event suppression (unlike the tag-push trigger, which never
# fires for tags created here). The Release workflow treats a dispatch at a
# tag ref exactly like a tag push, including the draft-Release manual
# publish gate.

on:
  push:
    branches:
      - 'release-tag/**'
      - 'release-run/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (vX.Y.Z)'
        required: true
      sha:
        description: 'Full 40-char commit SHA to tag. Empty = HEAD of the dispatched ref.'
        required: false
        default: ''
      run_release:
        description: 'Also dispatch Release + Deploy web at the new tag'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Parse request
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
          TAG_INPUT: ${{ inputs.tag }}
          SHA_INPUT: ${{ inputs.sha }}
          RUN_RELEASE_INPUT: ${{ inputs.run_release }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            SIGNAL_BRANCH="$REF_NAME"
            MODE="${REF_NAME%%/*}"                       # release-tag | release-run
            REST="${REF_NAME#*/}"
            TAG="${REST%%/*}"
            SHA_SEG="${REST#"$TAG"}"; SHA_SEG="${SHA_SEG#/}"
            SHA="${SHA_SEG:-$HEAD_SHA}"
            if [ "$MODE" = "release-run" ]; then
              RUN_RELEASE=true
              if [ -n "$SHA_SEG" ]; then
                echo "::error::release-run/ does not take a SHA segment; point the branch at the commit to release"
                exit 1
              fi
            else
              RUN_RELEASE=false
            fi
          else
            SIGNAL_BRANCH=""
            TAG="$TAG_INPUT"
            SHA="${SHA_INPUT:-$HEAD_SHA}"
            RUN_RELEASE="$RUN_RELEASE_INPUT"
          fi
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$'; then
            echo "::error::Tag \"$TAG\" does not look like vX.Y.Z"; exit 1
          fi
          if ! echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::SHA \"$SHA\" is not a full 40-char lowercase commit SHA"; exit 1
          fi
          {
            echo "tag=$TAG"
            echo "sha=$SHA"
            echo "run_release=$RUN_RELEASE"
            echo "signal_branch=$SIGNAL_BRANCH"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Plain git so a rejection (e.g. a tag ruleset without a bypass for
      # Actions) surfaces its real reason in the log instead of a generic
      # API 403.
      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.parse.outputs.tag }}
          SHA: ${{ steps.parse.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists; refusing to move it"; exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$SHA" -m "Release $TAG"
          git push origin "refs/tags/$TAG"
          echo "::notice::Created annotated tag $TAG at $SHA"

      - name: Chain Release + Deploy web at the tag
        if: steps.parse.outputs.run_release == 'true'
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.parse.outputs.tag }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = process.env.TAG;
            await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'release.yml', ref });
            await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'deploy-web.yml', ref });
            core.notice(`Dispatched Release + Deploy web at ${ref}`);

      - name: Delete signal branch
        if: always() && steps.parse.outputs.signal_branch != ''
        env:
          SIGNAL_BRANCH: ${{ steps.parse.outputs.signal_branch }}
        shell: bash
        run: git push origin --delete "$SIGNAL_BRANCH" || true
