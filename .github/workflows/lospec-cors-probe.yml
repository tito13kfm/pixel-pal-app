# One-shot probe for issue #133 (Lospec browser spec, Open Item 1), run B:
# run A found the docs are a Scalar UI over /docs/openapi.json (ACAO: * on
# the api host). This run captures the full OpenAPI spec + checks the CORS
# preflight for the Authorization header (Bearer key makes fetch non-simple).
# 3 requests total. Removed on this branch once results land in the spec.
name: lospec-cors-probe
on:
  push:
    branches: [claude/issue-133-api-requests-iu0kv5]
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Fetch full OpenAPI spec + summarize
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          curl -sS -m 30 -A "$UA" -o /tmp/openapi.json "https://api.lospec.com/docs/openapi.json"
          echo "size: $(wc -c < /tmp/openapi.json) bytes"
          echo "================ paths + methods ================"
          jq -r '.paths | to_entries[] | .key as $p | .value | to_entries[] | "\(.key | ascii_upcase) \($p) :: \(.value.summary)"' /tmp/openapi.json
          echo "================ full spec (paths detail, pretty) ================"
          jq '.paths' /tmp/openapi.json
          echo "================ full info + components ================"
          jq '{info: .info, components: .components, servers: .servers}' /tmp/openapi.json
          sleep 5
      - name: OPTIONS preflight for Authorization header
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          echo "================ OPTIONS /api/v1/palettes (preflight) ================"
          curl -sS -m 20 -X OPTIONS -D - -o /dev/null -A "$UA" \
            -H "Origin: https://tito13kfm.github.io" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: authorization" \
            "https://api.lospec.com/api/v1/palettes" \
            | tr -d '\r' | grep -iE '^(HTTP|access-control|allow|server|vary)' || true
          sleep 5
          echo "================ GET /api/v1/palettes unauthenticated (error shape + CORS) ================"
          curl -sS -m 20 -D - -o /tmp/unauth.json -A "$UA" \
            -H "Origin: https://tito13kfm.github.io" \
            "https://api.lospec.com/api/v1/palettes?limit=1" \
            | tr -d '\r' | grep -iE '^(HTTP|access-control|content-type|x-ratelimit|www-authenticate)' || true
          echo "---- body ----"
          head -c 400 /tmp/unauth.json; echo
      - name: Upload spec as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lospec-openapi
          path: /tmp/openapi.json
