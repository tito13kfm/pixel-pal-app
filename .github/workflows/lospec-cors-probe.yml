# One-shot probe for issue #133 (Lospec browser spec, Open Items 1+2):
# run 1 confirmed CORS wildcard on the documented {slug}.json endpoint.
# Run 2 checks the undocumented browse endpoint's CORS + shape, and dumps
# the two public API docs pages (the dev sandbox's network policy blocks
# lospec.com entirely). Requests are spaced; ~5 total this run.
# This file is removed on this branch once results land in the spec.
name: lospec-cors-probe
on:
  push:
    branches: [claude/issue-133-api-requests-iu0kv5]
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe browse endpoint CORS + shape
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          echo "================ browse endpoint: headers ================"
          curl -sS -m 20 -D - -o /tmp/browse.json \
            -A "$UA" -H "Origin: https://tito13kfm.github.io" \
            "https://lospec.com/palette-list/load?colorNumberFilterType=any&colorNumber=8&page=0&tag=&sortingType=default" \
            | tr -d '\r' | grep -iE '^(HTTP|access-control|content-type|server|x-ratelimit|ratelimit|retry-after)' || true
          echo "================ browse endpoint: body (first 800 chars) ================"
          head -c 800 /tmp/browse.json; echo
          sleep 5
      - name: Dump API docs pages as text
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          dump() {
            echo "================ $1 ================"
            curl -sS -m 20 -A "$UA" "$1" \
              | sed -e 's/<script[^>]*>.*<\/script>//g' -e 's/<[^>]*>/ /g' \
              | tr -s ' \t' ' ' | grep -vE '^\s*$' | head -220 || echo "(request failed)"
            sleep 5
          }
          dump "https://lospec.com/api/"
          dump "https://lospec.com/palettes/api"
