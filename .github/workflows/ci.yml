name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Build web target
        run: npm run build:web

      - name: JS lint scripts (contrast etc.)
        shell: bash
        run: |
          if compgen -G "tests/test_*.js" > /dev/null 2>&1; then
            for f in tests/test_*.js; do
              echo "Running $f"
              node "$f"
            done
          else
            echo "tests/ not tracked, skipping JS lint scripts"
          fi

      - name: Vitest unit tests
        run: npm test

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Install Playwright browsers
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright test

      - name: E2E tests (web build)
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright test --config=playwright.web.config.ts
