name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Lint - no em or en dashes in source and living docs
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          if git grep -nP "\x{2014}|\x{2013}" -- \
               'src/' 'src-tauri/src/' \
               README.md CHANGELOG.md CLAUDE.md \
               docs/ARCHITECTURE.md docs/architecture-rebuild-roadmap.md \
               docs/review-lenses.md docs/superpowers/specs/FEATURE-BACKLOG.md; then
            echo "::error::Em or en dash found in tracked source/living-docs (style rule). Use comma, period, parentheses, or colon."
            exit 1
          fi
          echo "No em or en dashes in the checked set."

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      # Non-blocking diagnostic (#109 step 1): tracks how much of App.tsx
      # would fail tsc if @ts-nocheck were removed today. Never fails the
      # build; restores the file unconditionally even if tsc errors.
      - name: Diagnostic - App.tsx type-check without @ts-nocheck (non-blocking)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          cp src/App.tsx src/App.tsx.bak
          sed -i '/^\/\/ @ts-nocheck$/d' src/App.tsx
          ERROR_COUNT=$(npx tsc --noEmit 2>&1 | grep -c "^src/App.tsx" || true)
          echo "::notice file=src/App.tsx::App.tsx would have $ERROR_COUNT tsc error(s) if @ts-nocheck were removed today (tracking metric for #109, non-blocking)"
          mv src/App.tsx.bak src/App.tsx
        continue-on-error: true

      - name: Clean dist before web build
        shell: bash
        run: rm -rf dist

      - name: Build web target
        run: npm run build:web

      - name: JS lint scripts (contrast etc.)
        shell: bash
        run: |
          if compgen -G "tests/test_*.js" > /dev/null 2>&1; then
            for f in tests/test_*.js; do
              echo "Running $f"
              node "$f"
            done
          else
            echo "tests/ not tracked, skipping JS lint scripts"
          fi

      - name: Vitest unit tests
        run: npm test

      - name: Lint - react hooks dep arrays
        if: matrix.platform == 'ubuntu-latest'
        run: npm run lint:hooks

      - name: Lint - no new dead-code exports
        if: matrix.platform == 'ubuntu-latest'
        run: npm run deadcode:ci

      # App.tsx line-count ratchet (#113): the file is being decomposed into
      # hooks/ + components/panels/; this guard stops regrowth between
      # extraction slices. Lower the budget as slices land; never raise it
      # without a decision on #113.
      - name: Lint - App.tsx line-count ratchet
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          BUDGET=1350
          LINES=$(wc -l < src/App.tsx)
          echo "src/App.tsx is $LINES lines (budget: $BUDGET)"
          if [ "$LINES" -gt "$BUDGET" ]; then
            echo "::error file=src/App.tsx::src/App.tsx is $LINES lines, over the $BUDGET-line ratchet (#113). Extract logic into hooks/ or components/panels/ instead of growing App.tsx, or lower-bound discussion on the issue."
            exit 1
          fi

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Install Playwright browsers
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright test

      - name: E2E tests (web build)
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright test --config=playwright.web.config.ts
