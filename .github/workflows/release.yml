name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for branch testing without creating a GitHub Release.
  # Run from Actions tab → Release workflow → Run workflow. Installers land
  # as downloadable workflow artifacts (14-day retention), not on the
  # Releases page. Useful to smoke-test a PR build before merging.
  workflow_dispatch:
    inputs:
      label:
        description: 'Artifact label (e.g. rip-legacy-hsv)'
        required: false
        default: 'dev'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Install frontend dependencies
        run: npm ci

      # Tag-push: build + publish to a GitHub Release entry.
      - name: Build and release (tag push)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PIXEL.PAL ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          includeDebug: false

      # Manual dispatch: build only (no Release entry). Installers + portable
      # exe are uploaded as workflow artifacts further below.
      - name: Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeDebug: false

      - name: Upload portable Windows .exe to Release (tag push)
        if: matrix.platform == 'windows-latest' && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          EXE="src-tauri/target/release/pixel-pal-app.exe"
          if [ ! -f "$EXE" ]; then
            echo "Portable exe missing at $EXE"
            ls -la src-tauri/target/release/ || true
            exit 1
          fi
          VER="${GITHUB_REF_NAME#v}"
          OUT="PIXEL.PAL_${VER}_x64-portable.exe"
          cp "$EXE" "$OUT"
          gh release upload "${GITHUB_REF_NAME}" "$OUT" --repo "$GITHUB_REPOSITORY" --clobber

      # Manual-dispatch artifact upload. Bundles installer output + Windows
      # portable .exe into a per-platform workflow artifact for download from
      # the Actions tab.
      - name: Upload installer artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}-${{ inputs.label }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/release/pixel-pal-app.exe
          if-no-files-found: warn
          retention-days: 14
