name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run dist

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.blockmap
            release/latest*.yml
          token: ${{ secrets.GITHUB_TOKEN }}
