name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for branch testing without creating a GitHub Release.
  # Run from Actions tab → Release workflow → Run workflow. Installers land
  # as downloadable workflow artifacts (14-day retention), not on the
  # Releases page. Useful to smoke-test a PR build before merging.
  workflow_dispatch:
    inputs:
      label:
        description: 'Artifact label (e.g. rip-legacy-hsv)'
        required: false
        default: 'dev'

jobs:
  # Gate: on a v* tag push, refuse to build unless the four version files all
  # match the tag and CHANGELOG.md carries a matching entry + compare-link
  # footer. Enforces the "no silent release" / lockstep-version policy in
  # CLAUDE.md. The job runs on workflow_dispatch too but skips the assertion,
  # so manual smoke-builds (which target branches, not tags) aren't blocked —
  # and because it still SUCCEEDS, the `needs` dependency below resolves.
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Verify version + CHANGELOG consistency (tag push only)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          echo "Verifying release ${GITHUB_REF_NAME} (version ${VER})"
          fail=0
          check() {
            if [ "$2" != "$VER" ]; then
              echo "::error::$1 is '$2', expected '$VER'"; fail=1
            else
              echo "ok: $1 = $2"
            fi
          }
          check "package.json version"    "$(node -p "require('./package.json').version")"
          check "tauri.conf.json version" "$(node -p "require('./src-tauri/tauri.conf.json').version")"
          check "Cargo.toml version"      "$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          check "Cargo.lock version"      "$(grep -A2 'name = "pixel-pal-app"' src-tauri/Cargo.lock | grep -m1 '^version = ' | sed -E 's/^version = "(.*)"/\1/')"
          if grep -qE "^## \[${VER}\]" CHANGELOG.md; then
            echo "ok: CHANGELOG.md has '## [${VER}]' section"
          else
            echo "::error::CHANGELOG.md missing '## [${VER}]' section — add release notes before tagging"; fail=1
          fi
          if grep -qE "^\[${VER}\]:" CHANGELOG.md; then
            echo "ok: CHANGELOG.md has '[${VER}]:' compare-link footer"
          else
            echo "::error::CHANGELOG.md missing '[${VER}]:' compare-link footer"; fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "Release verification FAILED for ${VER}. Fix the files above, re-tag, and push again."
            exit 1
          fi
          echo "Release verification passed for ${VER}."

  release:
    needs: verify-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Install frontend dependencies
        run: npm ci

      # Tag-push: build + create a DRAFT GitHub Release. Nothing reaches users
      # (and the updater's latest.json stays unreachable) until you click Publish
      # on the Releases page, so a tag can never auto-go-live past a manual check.
      - name: Build and release (tag push)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PIXEL.PAL ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          includeDebug: false

      # Manual dispatch: build only (no Release entry). Installers + portable
      # exe are uploaded as workflow artifacts further below.
      - name: Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeDebug: false

      - name: Upload portable Windows .exe to Release (tag push)
        if: matrix.platform == 'windows-latest' && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          EXE="src-tauri/target/release/pixel-pal-app.exe"
          if [ ! -f "$EXE" ]; then
            echo "Portable exe missing at $EXE"
            ls -la src-tauri/target/release/ || true
            exit 1
          fi
          VER="${GITHUB_REF_NAME#v}"
          OUT="PIXEL.PAL_${VER}_x64-portable.exe"
          cp "$EXE" "$OUT"
          gh release upload "${GITHUB_REF_NAME}" "$OUT" --repo "$GITHUB_REPOSITORY" --clobber

      # Manual-dispatch artifact upload. Bundles installer output + Windows
      # portable .exe into a per-platform workflow artifact for download from
      # the Actions tab.
      - name: Upload installer artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.platform }}-${{ inputs.label }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/release/pixel-pal-app.exe
          if-no-files-found: warn
          retention-days: 14
